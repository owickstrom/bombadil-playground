<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinner Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
    }

    .action-button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #4a90d9;
      color: white;
      cursor: pointer;
    }

    .action-button:hover {
      background: #357abd;
    }

    .action-button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner.visible {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-message {
      display: none;
      margin: 20px 0;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
    }

    .result-message.visible {
      display: block;
    }

    .result-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="action-button">Submit</button>
    <div class="spinner"></div>
    <div class="result-message"></div>
  </div>

  <script>
    const button = document.querySelector('.action-button');
    const spinner = document.querySelector('.spinner');
    const result = document.querySelector('.result-message');

    button.addEventListener('click', () => {
      // Reset previous result
      result.classList.remove('visible', 'success', 'error');
      result.textContent = '';

      // Show spinner, disable button
      spinner.classList.add('visible');
      button.disabled = true;

      // Random delay between 1-5 seconds
      const delay = 1000 + Math.random() * 4000;

      setTimeout(() => {
        // Hide spinner
        spinner.classList.remove('visible');

        // Randomly succeed or fail
        if (Math.random() > 0.5) {
          result.textContent = 'Operation completed successfully!';
          result.classList.add('visible', 'success');
        } else {
          result.textContent = 'Something went wrong. Please try again.';
          result.classList.add('visible', 'error');
        }

        button.disabled = false;
      }, delay);
    });
  </script>
</body>
</html>
